name: Chrome Extension CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate manifest.json exists
        run: test -f manifest.json

      - name: Validate manifest syntax
        run: cat manifest.json | jq .

      - name: Check project structure
        run: ls -la
